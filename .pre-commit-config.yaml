repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-json
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: forbid-api-key-prefixes
        name: scan for leaked API key prefixes
        entry: scripts/check-no-secrets.sh
        language: script
        types: [text]
        exclude: ^(\.env\.example|\.pre-commit-config\.yaml)$

      - id: pytest
        name: pytest (pre-push)
        entry: pytest -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
        always_run: true
